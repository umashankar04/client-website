{% extends "base.html" %}
{% block title %}Change Email{% endblock %}
{% block page_title %}✉️ Change Login Email{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-envelope-fill me-2 text-accent"></i>
        Update Login Email Address
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <div class="mb-3">
            <label class="form-label">Current Email Address</label>
            <input type="text" class="form-control" value="{{ current_email or 'Not configured' }}" readonly disabled style="opacity:0.65">
          </div>
          <div class="mb-4">
            <label class="form-label">New Email Address *</label>
            <input type="email" name="new_email" class="form-control form-control-lg" placeholder="Enter new email address" required autocomplete="email">
            <div class="form-text mt-2" style="font-size:12px;color:var(--text-muted)">
              <i class="bi bi-exclamation-triangle-fill text-warning me-1"></i>
              Make sure this is a valid email you have access to. Next login will require verification via this email.
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="bi bi-check-circle-fill me-2"></i>Update Email
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
