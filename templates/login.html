{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <i class="bi bi-camera-video-fill"></i>
    </div>
    <h1 class="login-title">VEMS</h1>
    <p class="login-sub">Video Editing Management System</p>

    <!-- Role Tabs -->
    <div class="role-tabs mb-4" id="roleTabs">
      <div class="role-tab active" id="tab-admin"  onclick="setRole('admin')">
        <i class="bi bi-shield-lock-fill me-1"></i> Admin
      </div>
      <div class="role-tab" id="tab-client" onclick="setRole('client')">
        <i class="bi bi-person-fill me-1"></i> Client
      </div>
    </div>

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
      <input type="hidden" name="role" id="roleInput" value="admin" />

      <!-- Admin Fields (Username & Password) -->
      <div id="adminFields">
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-person-badge-fill me-1"></i>Admin Username
          </label>
            <input type="text" name="username" id="adminUsernameInput"
                 class="form-control form-control-lg"
                 placeholder="Enter admin username"
                 required autocomplete="username" autofocus />
        </div>
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-lock-fill me-1"></i>Password
          </label>
          <div class="input-group">
              <input type="password" name="password" id="adminPasswordInput"
                   class="form-control form-control-lg"
                   placeholder="Enter password" required />
            <button class="btn btn-outline-secondary" type="button"
                      onclick="togglePwd('adminPasswordInput', 'adminPwdEyeIcon')" tabindex="-1">
                <i class="bi bi-eye-fill" id="adminPwdEyeIcon"></i>
            </button>
          </div>
        </div>
      </div>

        <!-- Client Fields (Name & Password) -->
      <div id="clientFields" style="display: none;">
        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-person-fill me-1"></i>Name
          </label>
          <input type="text" name="name" id="clientNameInput"
                 class="form-control form-control-lg"
                 placeholder="Enter your full name" autocomplete="name" />
        </div>

        <div class="mb-3">
          <label class="form-label">
            <i class="bi bi-lock-fill me-1"></i>Password
          </label>
          <div class="input-group">
            <input type="password" name="password" id="clientPasswordInput"
                   class="form-control form-control-lg"
                   placeholder="Enter your password" />
            <button class="btn btn-outline-secondary" type="button"
                    onclick="togglePwd('clientPasswordInput', 'clientPwdEyeIcon')" tabindex="-1">
              <i class="bi bi-eye-fill" id="clientPwdEyeIcon"></i>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 mt-1" id="submitBtn">
        <i class="bi bi-box-arrow-in-right me-2" id="submitIcon"></i>
        <span id="submitBtnText">Login</span>
      </button>
    </form>

    <!-- Info Footer -->
    <div class="mt-4 pt-3" style="border-top:1px solid var(--border)">
      <div class="d-flex align-items-start gap-2 mb-2" style="font-size:12px;color:var(--text-muted)">
        <i class="bi bi-shield-check-fill text-success mt-1" style="font-size:14px;flex-shrink:0"></i>
        <span>Secure system access. Clients log in with name and password, Admin logs in with credentials.</span>
      </div>
    </div>

    <!-- Sign Up Link for Clients -->
    <div id="signUpLink" class="text-center mt-3" style="display: none; font-size: 13.5px;">
      <span class="text-muted">Don't have an account?</span>
      <a href="{{ url_for('auth.signup') }}" class="text-accent fw-600 text-decoration-none ms-1">Sign Up Here</a>
    </div>

  </div>
</div>

<script>
  function setRole(role) {
    document.getElementById("roleInput").value = role;
    document.getElementById("tab-admin").classList.toggle("active",  role === "admin");
    document.getElementById("tab-client").classList.toggle("active", role === "client");

    if (role === "admin") {
      document.getElementById("adminFields").style.display = "block";
      document.getElementById("adminUsernameInput").required = true;
      document.getElementById("adminPasswordInput").required = true;

      document.getElementById("clientFields").style.display = "none";
      document.getElementById("clientNameInput").required = false;
      document.getElementById("clientPasswordInput").required = false;

      document.getElementById("submitBtnText").textContent = "Login";
      document.getElementById("submitIcon").className = "bi bi-box-arrow-in-right me-2";
      document.getElementById("signUpLink").style.display = "none";
    } else {
      document.getElementById("adminFields").style.display = "none";
      document.getElementById("adminUsernameInput").required = false;
      document.getElementById("adminPasswordInput").required = false;

      document.getElementById("clientFields").style.display = "block";
      document.getElementById("clientNameInput").required = true;
      document.getElementById("clientPasswordInput").required = true;

      document.getElementById("submitBtnText").textContent = "Login";
      document.getElementById("submitIcon").className = "bi bi-box-arrow-in-right me-2";
      document.getElementById("signUpLink").style.display = "block";
    }
  }

  function togglePwd(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === "password") {
      inp.type = "text";
      icon.className = "bi bi-eye-slash-fill";
    } else {
      inp.type = "password";
      icon.className = "bi bi-eye-fill";
    }
  }

  // Show loading state on submit
  document.getElementById("loginForm").addEventListener("submit", function() {
    const btn  = document.getElementById("submitBtn");
    const text = document.getElementById("submitBtnText");
    btn.disabled = true;
    text.textContent = "Logging in...";
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
  });
</script>
{% endblock %}
